/**:
  ros__parameters:
    inputs: ['ground_truth_cloud', 'camera_cloud']
    ground_truth_cloud: # A name to identify the input source
      type: pointcloud # Supported types: pointcloud
      topic: /velodyne_points_filtered
      queue_size: 10
      publish_on_update: true # Whether to publish the elevation map after a callback from this source.
      sensor_processor:
        type: perfect

    camera_cloud: # A name to identify the input source
      type: pointcloud # Supported types: pointcloud
      topic: /merged_points_filtered
      queue_size: 10
      publish_on_update: true # Whether to publish the elevation map after a callback from this source.
      sensor_processor:
        type: perfect

    # Use TF only (no odometry topic). This is useful to test with a fixed sensor.
    # Leaving this empty makes elevation_mapping skip pose covariance updates.
    robot_pose_with_covariance_topic: ""
    robot_pose_cache_size: 1

    map_frame_id: "map"
    robot_base_frame_id: "base_link"
    track_point_frame_id: "base_link"
    track_point_x: 0.0
    track_point_y: 0.0
    track_point_z: 0.0
    use_sim_time: false
